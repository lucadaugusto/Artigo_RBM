#!/usr/bin/env bash
# patch_compose.sh — Substitui o docker-compose.yml na EC2 pela versão corrigida
# Execute: chmod +x patch_compose.sh && ./patch_compose.sh
set -euo pipefail

TARGET="docker-compose.yml"

# Backup do original
cp "$TARGET" "${TARGET}.bak.$(date +%Y%m%d_%H%M%S)"
echo "[ok] Backup salvo"

cat > "$TARGET" << 'COMPOSE'
# =============================================================================
# FIWARE Plant Simulation Stack — NGSI-v2
# AWS EC2 t3.medium · Ubuntu 22.04 · Docker Compose v2
#
# Versões verificadas no Docker Hub em junho/2026:
#   fiware/orion        3.12.0       (3.10.1 NAO EXISTE — causava crash)
#   fiware/iotagent-ul  3.7.0        (3.4.0 estava desatualizado)
#   fiware/sth-comet    2.10.0
#   mongo               6.0
#   eclipse-mosquitto   2.0
#   nginx               1.25-alpine
#
# [fix] orion: 3.10.1 -> 3.12.0 (tag inexistente causava Restarting imediato)
# [fix] iotagent-ul: 3.4.0 -> 3.7.0
# [fix] Healthchecks corrigidos por imagem (curl/node/python3/wget)
# [fix] dashboard depends_on com condition:service_healthy
# [fix] expose redundante removido
# [fix] MongoDB --nojournal removido (invalido no MongoDB 5+)
# [fix] Orion: -fg -disableFileLog para logs visiveis via docker logs
# [add] logging json-file com max-size/max-file
# [add] mem_limit + mem_reservation para t3.medium (4 GB)
# [add] start_period em todos os healthchecks
# =============================================================================

networks:
  fiware-net:
    driver: bridge

volumes:
  mongo-data:
  mongo-hist-data:
  ml-models:

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    networks:
      - fiware-net
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 128m
    mem_reservation: 64m

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    networks:
      - fiware-net
    volumes:
      - mongo-data:/data/db
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 768m
    mem_reservation: 512m

  mongodb-hist:
    image: mongo:6.0
    container_name: mongodb-hist
    restart: unless-stopped
    networks:
      - fiware-net
    volumes:
      - mongo-hist-data:/data/db
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m
    mem_reservation: 256m

  orion:
    image: fiware/orion:3.12.0
    container_name: orion
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "127.0.0.1:1026:1026"
    command: >
      -dbURI mongodb://mongodb:27017
      -db orion
      -logLevel WARN
      -fg
      -disableFileLog
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "--fail", "-s", "http://localhost:1026/v2/entities?limit=1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    mem_reservation: 256m

  iot-agent:
    image: fiware/iotagent-ul:3.7.0
    container_name: iot-agent
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      orion:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    ports:
      - "127.0.0.1:4041:4041"
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_CB_NGSI_VERSION=v2
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_MONGO_HOST=mongodb
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentul
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_MQTT_KEEPALIVE=60
      - IOTA_DEFAULT_RESOURCE=/iot/d
      - IOTA_LOG_LEVEL=WARN
      - IOTA_TIMESTAMP=true
      - IOTA_AUTOCAST=true
    logging: *default-logging
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          node -e "require('http').get('http://localhost:4041/iot/about',
          function(r){process.exit(r.statusCode===200?0:1)}).on('error',
          function(){process.exit(1)})"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 256m
    mem_reservation: 128m

  sth-comet:
    image: fiware/sth-comet:2.10.0
    container_name: sth-comet
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      mongodb-hist:
        condition: service_healthy
    ports:
      - "127.0.0.1:8666:8666"
    environment:
      - STH_HOST=0.0.0.0
      - STH_PORT=8666
      - DB_URI=mongodb-hist:27017
      - DB_PREFIX=sth_
      - DEFAULT_SERVICE=factory
      - DEFAULT_SERVICE_PATH=/plant
      - TRUNCATION_EXPIREAFTERSECONDS=0
      - LOGOPS_LEVEL=WARN
    logging: *default-logging
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          node -e "require('http').get('http://localhost:8666/STH/v2/version',
          function(r){process.exit(r.statusCode<500?0:1)}).on('error',
          function(){process.exit(1)})"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 256m
    mem_reservation: 128m

  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: ml-service
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      orion:
        condition: service_healthy
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ml-models:/app/models
    environment:
      - MODEL_PATH=/app/models/model.pkl
      - FEATURE_PATH=/app/models/feature_columns.json
      - FAULT_THRESHOLD=0.60
      - ML_WINDOW=5
      - ORION_URL=http://orion:1026
    logging: *default-logging
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          python3 -c "
          import urllib.request, sys
          try:
            urllib.request.urlopen('http://localhost:5001/health', timeout=3)
            sys.exit(0)
          except Exception:
            sys.exit(1)
          "
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    mem_reservation: 256m

  dashboard:
    image: nginx:1.25-alpine
    container_name: dashboard
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      orion:
        condition: service_healthy
      sth-comet:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    mem_limit: 64m
    mem_reservation: 32m
COMPOSE

echo "[ok] docker-compose.yml substituido"
echo ""
echo "Proximos passos:"
echo "  docker compose down"
echo "  sudo docker compose up -d"
echo "  sudo docker logs -f orion"
