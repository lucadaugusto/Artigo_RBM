# =============================================================================
# FIWARE Plant Simulation Stack — NGSI-v2
# AWS EC2 t3.medium · Ubuntu 22.04 · Docker Compose v2
#
# Revisão:
#   [fix] MongoDB: removido --nojournal (inválido no MongoDB 5+)
#   [fix] Healthchecks: substituídos por comandos disponíveis em cada imagem base
#         - orion/iotagent/sth-comet: bash /dev/tcp (sem dependência externa)
#         - ml-service: python3 urllib (disponível na imagem python:3.11-slim)
#   [fix] sth-comet healthcheck: era /STH/v1/contextEntities (retorna 404 sem dados)
#         substituído por verificação de porta via bash /dev/tcp
#   [fix] dashboard depends_on: adicionado condition: service_healthy para todos
#         os dependentes, evitando subida antes dos serviços estarem prontos
#   [fix] expose redundante removido (ports já publica a porta)
#   [add] logging: limits de tamanho para evitar disco cheio em produção
#   [add] mem_limit + mem_reservation por serviço para t3.medium (4 GB)
#
# Portas públicas (abrir no Security Group da EC2):
#   1883  — MQTT  (restrito ao IP da máquina edge)
#   8080  — Dashboard (acesso público)
#
# Portas internas (NÃO expor publicamente):
#   1026  — Orion CB
#   4041  — IoT Agent
#   8666  — STH-Comet
#   5001  — ML Service
#   27017 — MongoDB (ambos)
# =============================================================================

networks:
  fiware-net:
    driver: bridge

volumes:
  mongo-data:
  mongo-hist-data:
  ml-models:

# Bloco de logging reutilizável via extensão YAML
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Mosquitto — MQTT broker ─────────────────────────────────────────────────
  # Porta 1883 pública. Restringir origem no Security Group da AWS ao IP do edge.
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    networks:
      - fiware-net
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    logging: *default-logging
    healthcheck:
      # mosquitto_sub é nativo da imagem — ferramenta mais confiável disponível
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 128m
    mem_reservation: 64m

  # ── MongoDB — estado atual do Orion ─────────────────────────────────────────
  # NOTA: --nojournal foi removido no MongoDB 5.0+. O WiredTiger (engine padrão)
  # não usa journal da mesma forma; omitir o command é o comportamento correto.
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    networks:
      - fiware-net
    volumes:
      - mongo-data:/data/db
    logging: *default-logging
    healthcheck:
      # mongosh está disponível no mongo:6.0
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 768m
    mem_reservation: 512m

  # ── MongoDB histórico — exclusivo do STH-Comet ──────────────────────────────
  mongodb-hist:
    image: mongo:6.0
    container_name: mongodb-hist
    restart: unless-stopped
    networks:
      - fiware-net
    volumes:
      - mongo-hist-data:/data/db
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m
    mem_reservation: 256m

  # ── Orion Context Broker — NGSI-v2 ─────────────────────────────────────────
  # Porta 1026 vinculada a 127.0.0.1 — não acessível externamente.
  # O nginx proxia /orion/ → http://orion:1026/ para o dashboard.
  orion:
    image: fiware/orion:3.10.1
    container_name: orion
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "127.0.0.1:1026:1026"
    command: -dbURI mongodb://mongodb:27017 -logLevel WARN
    logging: *default-logging
    healthcheck:
      # fiware/orion usa debian:bullseye-slim — sem curl nem wget por padrão.
      # bash /dev/tcp é um built-in do bash que não precisa de ferramentas externas.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1026'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    mem_reservation: 256m

  # ── IoT Agent MQTT — tradução Ultralight 2.0 → NGSI-v2 ─────────────────────
  # Porta 4041 vinculada a 127.0.0.1 — interna.
  # Recebe mensagens do broker Mosquitto via subscribe interno.
  iot-agent:
    image: fiware/iotagent-ul:3.4.0
    container_name: iot-agent
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      orion:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    ports:
      - "127.0.0.1:4041:4041"
    environment:
      # ── Context Broker ──────────────────────────────────────────────────────
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_CB_NGSI_VERSION=v2
      # ── Northbound (API de provisionamento) ─────────────────────────────────
      - IOTA_NORTH_PORT=4041
      # ── Registro de devices (MongoDB) ───────────────────────────────────────
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_MONGO_HOST=mongodb
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentul
      # ── Southbound MQTT ──────────────────────────────────────────────────────
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_MQTT_KEEPALIVE=60
      # IOTA_DEFAULT_RESOURCE é para transporte HTTP; ignorado para MQTT puro.
      # Mantido para compatibilidade com provisionamento via REST.
      - IOTA_DEFAULT_RESOURCE=/iot/d
      # ── Comportamento ────────────────────────────────────────────────────────
      - IOTA_LOG_LEVEL=WARN
      - IOTA_TIMESTAMP=true   # injeta TimeInstant em cada atualização de entidade
      - IOTA_AUTOCAST=true    # converte strings numéricas para Number automaticamente
    logging: *default-logging
    healthcheck:
      # fiware/iotagent-ul usa node:18-slim — node está disponível.
      # Consulta o endpoint /iot/about via módulo http nativo do Node.
      test:
        - "CMD-SHELL"
        - >
          node -e "
          require('http').get('http://localhost:4041/iot/about', (r) => {
            process.exit(r.statusCode === 200 ? 0 : 1);
          }).on('error', () => process.exit(1));
          "
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 256m
    mem_reservation: 128m

  # ── STH-Comet — persistência de séries temporais ────────────────────────────
  # Porta 8666 vinculada a 127.0.0.1 — interna.
  # Recebe notificações HTTP do Orion via subscription registrada no provision.sh.
  sth-comet:
    image: fiware/sth-comet:2.10.0
    container_name: sth-comet
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      mongodb-hist:
        condition: service_healthy
    ports:
      - "127.0.0.1:8666:8666"
    environment:
      - STH_HOST=0.0.0.0
      - STH_PORT=8666
      - DB_URI=mongodb-hist:27017
      - DB_PREFIX=sth_
      - DEFAULT_SERVICE=factory
      - DEFAULT_SERVICE_PATH=/plant
      # 0 = sem expiração automática. Para produção, defina em segundos
      # (ex: 7776000 = 90 dias) para evitar crescimento ilimitado do banco.
      - TRUNCATION_EXPIREAFTERSECONDS=0
      - LOGOPS_LEVEL=WARN
    logging: *default-logging
    healthcheck:
      # fiware/sth-comet usa node:16-slim — node disponível.
      # NÃO usar /STH/v1/contextEntities: retorna 404 antes de haver dados,
      # o que derruba o healthcheck incorretamente.
      # Verificamos apenas se a porta está aceitando conexões.
      test:
        - "CMD-SHELL"
        - >
          node -e "
          require('http').get('http://localhost:8666/STH/v2/version', (r) => {
            process.exit(r.statusCode < 500 ? 0 : 1);
          }).on('error', () => process.exit(1));
          "
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 256m
    mem_reservation: 128m

  # ── ML Service — predição de falhas (XGBoost + FastAPI) ────────────────────
  # Construído a partir de ./ml_service/Dockerfile.
  # Porta 5001 vinculada a 127.0.0.1 — interna.
  # Recebe notificações do Orion via subscription (POST /notify).
  # model.pkl persistido no volume ml-models entre restarts.
  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: ml-service
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      orion:
        condition: service_healthy
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ml-models:/app/models
    environment:
      - MODEL_PATH=/app/models/model.pkl
      - FEATURE_PATH=/app/models/feature_columns.json
      - FAULT_THRESHOLD=0.60
      - ML_WINDOW=5
      - ORION_URL=http://orion:1026
    logging: *default-logging
    healthcheck:
      # python:3.11-slim (imagem base do Dockerfile) tem python3 disponível.
      # Consulta /health via urllib — sem dependência de curl ou wget.
      test:
        - "CMD-SHELL"
        - >
          python3 -c "
          import urllib.request, sys
          try:
            urllib.request.urlopen('http://localhost:5001/health', timeout=3)
            sys.exit(0)
          except Exception:
            sys.exit(1)
          "
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    mem_reservation: 256m

  # ── Dashboard — frontend HTML/JS servido por nginx ──────────────────────────
  # Única porta pública além do MQTT.
  # nginx proxia /orion/ → Orion, /sth/ → STH-Comet, /ml/ → ML Service.
  dashboard:
    image: nginx:1.25-alpine
    container_name: dashboard
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      orion:
        condition: service_healthy
      sth-comet:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging: *default-logging
    healthcheck:
      # nginx:alpine tem wget disponível
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    mem_limit: 64m
    mem_reservation: 32m
