version: "3.9"

services:

  # ---------------------------------------------------------
  # MongoDB (principal)
  # ---------------------------------------------------------
  mongodb:
    image: mongo:4.4
    container_name: mongodb
    restart: unless-stopped
    networks:
      - fiware-net
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # MongoDB Histórico (para STH-Comet)
  # ---------------------------------------------------------
  mongodb-hist:
    image: mongo:4.4
    container_name: mongodb-hist
    restart: unless-stopped
    networks:
      - fiware-net
    volumes:
      - mongo-hist-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # Orion Context Broker
  # ---------------------------------------------------------
  orion:
    image: fiware/orion:3.10.1
    container_name: orion
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      mongodb:
        condition: service_healthy
    expose:
      - "1026"
    ports:
      - "127.0.0.1:1026:1026"
    command:
      - "-dbURI"
      - "mongodb://mongodb:27017"
      - "-db"
      - "orion"
      - "-logLevel"
      - "WARN"
      - "-noCache"
      - "-corsOrigin"
      - "__ALL"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1026/version"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------
  # Mosquitto MQTT Broker
  # ---------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    networks:
      - fiware-net
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-conf:/mosquitto/config
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$SYS/#", "-C", "1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # IoT Agent UL MQTT
  # ---------------------------------------------------------
  iot-agent:
    image: fiware/iotagent-ul:3.4.0
    container_name: iot-agent
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      orion:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_MONGO_HOST=mongodb
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagent
      - IOTA_PROVIDER_URL=http://iot-agent:4041
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
    ports:
      - "4041:4041"

  # ---------------------------------------------------------
  # STH-Comet (Histórico)
  # ---------------------------------------------------------
  sth-comet:
    image: fiware/sth-comet:3.4.0
    container_name: sth-comet
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      mongodb-hist:
        condition: service_healthy
    environment:
      - STH_HOST=0.0.0.0
      - STH_PORT=8666
      - DB_URI=mongodb://mongodb-hist:27017
    ports:
      - "8666:8666"

  # ---------------------------------------------------------
  # Dashboard
  # ---------------------------------------------------------
  dashboard:
    image: your-dashboard-image
    container_name: dashboard
    restart: unless-stopped
    networks:
      - fiware-net
    ports:
      - "8080:80"

  # ---------------------------------------------------------
  # ML Service
  # ---------------------------------------------------------
  ml-service:
    image: your-ml-service-image
    container_name: ml-service
    restart: unless-stopped
    networks:
      - fiware-net
    ports:
      - "5000:5000"

# ---------------------------------------------------------
# Networks & Volumes
# ---------------------------------------------------------
networks:
  fiware-net:

volumes:
  mongo-data:
  mongo-hist-data:
  mosquitto-data:
  mosquitto-conf:
