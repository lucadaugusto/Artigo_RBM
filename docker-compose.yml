# =============================================================================
# FIWARE Stack — NGSI-v2 — AWS EC2 t3.medium
# Corrigido em junho/2026:
#   [fix] fiware/orion:3.10.1 → 3.12.0  (3.10.1 não existe no Docker Hub)
#   [fix] fiware/iotagent-ul:3.4.0 → 3.7.0
#   [fix] command do Orion: string → lista YAML (evita "parameter not recognized")
#   [fix] Orion: adicionado -fg e -disableFileLog (logs visíveis via docker logs)
#   [fix] MongoDB: --nojournal removido (flag inválida no MongoDB 5+)
#   [fix] Healthcheck Orion: /version → /v2/entities (toca o banco de verdade)
#   [fix] Healthcheck STH-Comet: /STH/v1/contextEntities → /STH/v2/version
#         (/v1/contextEntities retorna 404 quando não há dados, derruba o hc)
#   [fix] dashboard depends_on: lista simples → condition:service_healthy
#   [fix] expose redundante removido (ports já publica a porta)
#   [add] start_period em todos os healthchecks (evita falsos unhealthy na subida)
# =============================================================================

networks:
  fiware-net:
    driver: bridge

volumes:
  mongo-data:
  mongo-hist-data:
  ml-models:

services:

  # ── Mosquitto — MQTT broker ──────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    networks:
      - fiware-net
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── MongoDB — estado atual do Orion ─────────────────────────────────────────
  # --nojournal foi removido no MongoDB 5.0+ e causa erro fatal no 6.0
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    networks:
      - fiware-net
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── MongoDB histórico — exclusivo do STH-Comet ───────────────────────────────
  mongodb-hist:
    image: mongo:6.0
    container_name: mongodb-hist
    restart: unless-stopped
    networks:
      - fiware-net
    volumes:
      - mongo-hist-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Orion Context Broker — NGSI-v2 ──────────────────────────────────────────
  # VERSÃO: 3.12.0 — a 3.10.1 não existe no Docker Hub (causava crash imediato)
  # command como LISTA para evitar "parameter not recognized" com o exec do Orion
  # -fg + -disableFileLog: logs visíveis via "docker logs orion"
  orion:
    image: fiware/orion:3.12.0
    container_name: orion
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "127.0.0.1:1026:1026"
    command:
      - -dbURI
      - mongodb://mongodb:27017
      - -db
      - orion
      - -logLevel
      - WARN
      - -fg
      - -disableFileLog
    healthcheck:
      # /v2/entities toca o banco; /version responde mesmo com MongoDB down
      test: ["CMD", "curl", "--fail", "-s", "http://localhost:1026/v2/entities?limit=1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── IoT Agent MQTT — Ultralight 2.0 → NGSI-v2 ───────────────────────────────
  # VERSÃO: 3.7.0 (versão estável disponível no Docker Hub)
  iot-agent:
    image: fiware/iotagent-ul:3.7.0
    container_name: iot-agent
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      orion:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    ports:
      - "127.0.0.1:4041:4041"
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_CB_NGSI_VERSION=v2
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_MONGO_HOST=mongodb
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentul
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_MQTT_KEEPALIVE=60
      - IOTA_DEFAULT_RESOURCE=/iot/d
      - IOTA_LOG_LEVEL=WARN
      - IOTA_TIMESTAMP=true
      - IOTA_AUTOCAST=true
    healthcheck:
      # curl está disponível na imagem iotagent-ul:3.7.0
      test: ["CMD", "curl", "--fail", "-s", "http://localhost:4041/iot/about"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── STH-Comet — persistência de séries temporais ────────────────────────────
  sth-comet:
    image: fiware/sth-comet:2.10.0
    container_name: sth-comet
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      mongodb-hist:
        condition: service_healthy
    ports:
      - "127.0.0.1:8666:8666"
    environment:
      - STH_HOST=0.0.0.0
      - STH_PORT=8666
      - DB_URI=mongodb-hist:27017
      - DB_PREFIX=sth_
      - DEFAULT_SERVICE=factory
      - DEFAULT_SERVICE_PATH=/plant
      - TRUNCATION_EXPIREAFTERSECONDS=0
      - LOGOPS_LEVEL=WARN
    healthcheck:
      # /STH/v1/contextEntities retorna 404 sem dados → usa /STH/v2/version
      test: ["CMD", "curl", "--fail", "-s", "http://localhost:8666/STH/v2/version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── ML Service — FastAPI + XGBoost ──────────────────────────────────────────
  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: ml-service
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      orion:
        condition: service_healthy
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ml-models:/app/models
    environment:
      - MODEL_PATH=/app/models/model.pkl
      - FEATURE_PATH=/app/models/feature_columns.json
      - FAULT_THRESHOLD=0.60
      - ML_WINDOW=5
      - ORION_URL=http://orion:1026
    healthcheck:
      test: ["CMD", "curl", "--fail", "-s", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Dashboard — nginx + HTML/JS ──────────────────────────────────────────────
  dashboard:
    image: nginx:1.25-alpine
    container_name: dashboard
    restart: unless-stopped
    networks:
      - fiware-net
    depends_on:
      orion:
        condition: service_healthy
      sth-comet:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
